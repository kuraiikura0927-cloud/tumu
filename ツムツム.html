<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Fixed Tsum Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; user-select: none; touch-action: none; }
        #container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; }
        canvas { display: block; }
        #effect-canvas { position: absolute; top: 0; pointer-events: none; z-index: 5; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; color: white; pointer-events: none; }
        #score { font-size: 24px; font-weight: bold; }
        /* エラー表示用（真っ白防止） */
        #error-log { position: fixed; bottom: 0; width: 100%; color: red; font-size: 10px; background: rgba(0,0,0,0.5); z-index: 100; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div style="font-size: 10px; opacity: 0.7;">7色+鉄球モード</div>
    </div>
    
    <div id="container">
        <div id="game-stage"></div>
        <canvas id="effect-canvas"></canvas>
    </div>

    <div id="error-log"></div>

    <script>
        // エラー検知用
        window.onerror = function(msg) {
            document.getElementById('error-log').innerText += msg + "\n";
        };

        const { Engine, Render, Runner, Bodies, Composite, Query } = Matter;

        // --- 設定 ---
        const STAGE_W = Math.min(window.innerWidth, 400);
        const STAGE_H = window.innerHeight;
        const TSUM_RADIUS = 22;
        const COLORS = ['#FF4444', '#44FF44', '#4444FF', '#FFFF44', '#FF44FF', '#44FFFF', '#FFAA00'];
        let score = 0;

        // --- 1. 物理エンジン初期化 ---
        const engine = Engine.create();
        const render = Render.create({
            element: document.getElementById('game-stage'),
            engine: engine,
            options: {
                width: STAGE_W,
                height: STAGE_H,
                wireframes: false,
                background: '#111'
            }
        });

        // 壁
        const walls = [
            Bodies.rectangle(STAGE_W/2, STAGE_H + 25, STAGE_W, 50, { isStatic: true, render: { fillStyle: '#333' } }),
            Bodies.rectangle(-25, STAGE_H/2, 50, STAGE_H, { isStatic: true }),
            Bodies.rectangle(STAGE_W + 25, STAGE_H/2, 50, STAGE_H, { isStatic: true })
        ];
        Composite.add(engine.world, walls);

        // ツム生成関数
        function createTsum(x, y, isObstacle = false) {
            if (isObstacle) {
                return Bodies.circle(x, y, TSUM_RADIUS * 1.1, {
                    restitution: 0.1, label: 'obstacle', render: { fillStyle: '#222', strokeStyle: '#555', lineWidth: 3 }
                });
            }
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];
            return Bodies.circle(x, y, TSUM_RADIUS, {
                restitution: 0.4, friction: 0.01, label: 'tsum',
                colorType: color, render: { fillStyle: color, strokeStyle: '#fff', lineWidth: 1 }
            });
        }

        // 初回投入
        for(let i=0; i<45; i++) {
            Composite.add(engine.world, createTsum(Math.random()*STAGE_W, -STAGE_H * Math.random(), Math.random() < 0.1));
        }

        // --- 2. エフェクト設定 ---
        const efCanvas = document.getElementById('effect-canvas');
        const efCtx = efCanvas.getContext('2d');
        efCanvas.width = STAGE_W;
        efCanvas.height = STAGE_H;
        let particles = [];

        function burst(x, y, color) {
            for(let i=0; i<8; i++) {
                particles.push({
                    x, y, vx: (Math.random()-0.5)*10, vy: (Math.random()-0.5)*10,
                    life: 1.0, color: color
                });
            }
        }

        // --- 3. 操作ロジック ---
        let selected = [];
        let isDown = false;

        const getMousePos = (e) => {
            const rect = efCanvas.getBoundingClientRect();
            const t = e.touches ? e.touches[0] : e;
            return { x: t.clientX - rect.left, y: t.clientY - rect.top };
        };

        const onStart = () => { isDown = true; selected = []; };
        const onEnd = () => {
            isDown = false;
            if (selected.length >= 3) {
                score += selected.length * 100;
                document.getElementById('score').innerText = "SCORE: " + score;
                selected.forEach(b => {
                    burst(b.position.x, b.position.y, b.colorType);
                    Composite.remove(engine.world, b);
                    setTimeout(() => {
                        Composite.add(engine.world, createTsum(Math.random()*STAGE_W, -50, Math.random() < 0.15));
                    }, 400);
                });
            } else {
                selected.forEach(b => b.render.opacity = 1.0);
            }
            selected = [];
        };

        const onMove = (e) => {
            if (!isDown) return;
            const pos = getMousePos(e);
            const hit = Query.point(Composite.allBodies(engine.world), pos)[0];
            if (hit && hit.label === 'tsum' && !selected.includes(hit)) {
                if (selected.length === 0 || (hit.colorType === selected[selected.length-1].colorType && Math.hypot(hit.position.x-selected[selected.length-1].position.x, hit.position.y-selected[selected.length-1].position.y) < 60)) {
                    hit.render.opacity = 0.5;
                    selected.push(hit);
                    burst(pos.x, pos.y, '#fff');
                }
            }
        };

        window.addEventListener('mousedown', onStart); window.addEventListener('touchstart', onStart);
        window.addEventListener('mouseup', onEnd); window.addEventListener('touchend', onEnd);
        window.addEventListener('mousemove', onMove); window.addEventListener('touchmove', onMove);

        // --- 4. ループ ---
        Render.run(render);
        Runner.run(Runner.create(), engine);

        (function animate() {
            efCtx.clearRect(0, 0, STAGE_W, STAGE_H);
            // パーティクル更新
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.03;
                efCtx.globalAlpha = p.life;
                efCtx.fillStyle = p.color;
                efCtx.beginPath(); efCtx.arc(p.x, p.y, 3, 0, Math.PI*2); efCtx.fill();
            });
            // 選択線
            if (selected.length > 1) {
                efCtx.globalAlpha = 1; efCtx.strokeStyle = "white"; efCtx.lineWidth = 4;
                efCtx.beginPath();
                efCtx.moveTo(selected[0].position.x, selected[0].position.y);
                selected.forEach(p => efCtx.lineTo(p.position.x, p.position.y));
                efCtx.stroke();
            }
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
